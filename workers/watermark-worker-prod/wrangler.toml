name = "watermark-worker-prod"
main = "src/index.js"
compatibility_date = "2025-09-01"

# Routes: same as dev but using prod KV namespace
#  /gallery/*  — public, watermarked + degraded
#  /internal/* — admin, originals (no watermark)
#  /assets/*   — public event assets (covers, logos) — originals, no watermark
[[routes]]
pattern = "cdn.titantv.com.ec/gallery/*"
zone_name = "titantv.com.ec"

[[routes]]
pattern = "cdn.titantv.com.ec/internal/*"
zone_name = "titantv.com.ec"

[[routes]]
pattern = "cdn.titantv.com.ec/assets/*"
zone_name = "titantv.com.ec"

# Workers KV — slug → B2 object path mapping (PROD namespace)
[[kv_namespaces]]
binding = "IMAGE_MAP"
id = "39b5e4e4652645678ad93027d4b97c7e"

# Required secrets: B2_KEY_ID, B2_APP_KEY, B2_BUCKET, B2_REGION,
#   WATERMARK_OPACITY, DEFAULT_QUALITY, QR_WORKER_HOST, PUBLIC_DOMAIN
